<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Summary</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Chart.js is no longer needed because the summary uses a CSS-based pie chart. -->
  </head>
  <body>
    <h1>Expense Summary</h1>
    <nav style="text-align: center; margin-bottom: 1rem;">
      <a href="index.html">Back to Tracker</a>
    </nav>
    <!-- Date selector for weekly and monthly summary -->
    <div class="summary-controls">
      <label for="summary-date"><strong>Pilih Tanggal:</strong></label>
      <input type="date" id="summary-date" />
      <button id="load-summary" type="button">Load</button>
    </div>
    <!-- Container for dynamic summary section -->
    <div id="summary-container"></div>
    <p class="note">
      Pilih tanggal di atas untuk menampilkan ringkasan mingguan dan bulanan yang
      mencakup tanggal tersebut. Total pemasukan dan pengeluaran, serta
      persentase setiap kategori pengeluaran akan ditampilkan untuk minggu
      (Senin–Minggu) dan bulan yang dipilih.
    </p>
    <!-- Append a version query to force browsers to load the latest summary.js, avoiding cache issues -->
    <script src="summary.js?v=20260617" defer></script>
  </body>
</html>
